name: Update realtime quotes

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes during Taiwan regular session, Monday-Friday.
    # Asia/Taipei 09:00-12:55 = UTC 01:00-04:55.
    - cron: "*/5 1-4 * * 1-5"
    # Asia/Taipei 13:00-13:25 = UTC 05:00-05:25.
    - cron: "0-25/5 5 * * 1-5"
    # First post-close stock-price snapshot at Asia/Taipei 13:30.
    - cron: "30 5 * * 1-5"

permissions:
  contents: write

jobs:
  update-realtime-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate realtime quote snapshot
        run: node scripts/generate-realtime.mjs

      - name: Commit updated realtime quotes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet || git commit -m "Update realtime quotes"
          git push
