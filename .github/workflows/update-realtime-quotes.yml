name: Update realtime quotes

on:
  workflow_dispatch:
  schedule:
    # Taiwan regular session, Monday-Friday. GitHub Actions cron uses UTC.
    - cron: "*/5 1-4 * * 1-5"
    - cron: "0-25/5 5 * * 1-5"
    - cron: "30 5 * * 1-5"

permissions:
  contents: write

concurrency:
  group: market-data-writer
  cancel-in-progress: false

jobs:
  update-realtime-quotes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Generate realtime quote snapshot
        run: node scripts/generate-realtime.mjs

      - name: Commit and push updated realtime quotes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet && exit 0
          git commit -m "Update realtime quotes"

          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done

          echo "Unable to publish realtime quotes after 3 attempts."
          exit 1
