name: Update sector data

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes from 18:30 to 22:30 Asia/Taipei, Monday-Friday.
    # GitHub Actions cron uses UTC.
    - cron: "30 10-14 * * 1-5"
    - cron: "0 11-14 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate latest official-data snapshot
        run: node scripts/generate-latest.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet || git commit -m "Update sector data"
          git push
